name: Render Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiger Deployment-Job, laufende Deployments werden nicht abgebrochen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Render AsciiDoc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install Asciidoctor
        run: |
          sudo gem install asciidoctor
          sudo gem install asciidoctor-diagram

      - name: Render AsciiDoc to HTML
        run: |
          mkdir -p _site
          asciidoctor \
            --backend html5 \
            --out-file _site/index.html \
            --attribute toc=left \
            --attribute toclevels=3 \
            --attribute sectanchors \
            --attribute source-highlighter=highlight.js \
            --attribute icons=font \
            --attribute reproducible \
            docs/graffl.adoc

          # Bilder und andere Assets aus docs/ mitkopieren
          find docs/ -type f ! -name "*.adoc" -exec cp --parents {} _site/ \;

          # Einfaches Redirect-HTML falls jemand /docs/graffl aufruft
          cp _site/index.html _site/graffl.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4